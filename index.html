<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopForYou — Bons plans Amazon</title>
  <meta http-equiv="refresh" content="2;url=https://amzn.to/4ddmLLI">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f0f0f; color: white;
      min-height: 100vh; display: flex;
      flex-direction: column; align-items: center;
      justify-content: center; text-align: center; padding: 24px;
    }
    .logo { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 16px; color: #aaa; margin-bottom: 32px; }
    .btn {
      display: inline-block; background: #FF9900;
      color: #0f0f0f; font-weight: 700; font-size: 18px;
      padding: 16px 40px; border-radius: 50px;
      text-decoration: none; margin-bottom: 16px;
    }
    .note { font-size: 13px; color: #666; }
  </style>
</head>
<body>
  <div class="logo">🛍️</div>
  <h1>ShopForYou</h1>
  <p>Tu vas être redirigé vers le produit Amazon...</p>
  <a class="btn" href="https://amzn.to/4ddmLLI">👉 Voir le produit sur Amazon</a>
  <p class="note">Lien affilié — je touche une petite commission sans surcoût pour toi</p>
  <script>
    setTimeout(() => { window.location.href = "https://amzn.to/4ddmLLI"; }, 2000);
  </script>
</body>
</html>
